title: "Holliverse Wiki"
description: "고객 데이터 기반 고객 분석 서비스 — 팀 프로젝트 문서 허브"

# ⭐ 레포명이 docs이므로 반드시 /docs
baseurl: "/docs"
url: "https://one-year-gap.github.io"

markdown: kramdown
highlighter: rouge
permalink: /:categories/:year/:month/:day/:title/
future: true

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

paginate: 12
paginate_path: "/page/:num/"

# admin 폴더가 빌드에서 제외되지 않도록 명시
include:
  - admin

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

exclude:
  - node_modules
  - Gemfile.lock
  - README.md
  - GITHUB_ACTIONS_GUIDE.md
  - sveltia-cms-auth