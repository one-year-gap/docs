# ============================================================
# 03-auto-label.yml
# 역할: PR에서 변경된 파일 경로를 보고 자동으로 라벨 붙이기
#       예: _posts/백엔드/분석/ 변경 → "백엔드 › 분석" 라벨
# 트리거: PR 생성/업데이트 시
# ============================================================

name: 🏷️ Auto Label PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label by Changed Files
    runs-on: ubuntu-latest

    steps:
      - name: ① 변경 파일 기반 자동 라벨
        uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml
          sync-labels: true         # PR 파일 변경 시 라벨 자동 갱신
